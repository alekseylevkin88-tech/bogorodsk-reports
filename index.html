<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Жалобы Bogorodsk RP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root{--bg:#020617;--accent:#4ea8ff;--text:#f5f7ff;--glass:rgba(4,10,24,0.82);--radius:18px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--text);font-family:system-ui;padding:20px;display:flex;justify-content:center}
        .glass-card{background:var(--glass);border-radius:var(--radius);padding:24px;max-width:600px;width:100%;backdrop-filter:blur(20px);border:1px solid rgba(78,168,255,0.35);box-shadow:0 24px 55px rgba(1,4,12,0.9)}
        .form-group{margin-bottom:16px}
        label{display:block;margin-bottom:8px;font-weight:600}
        input,textarea{padding:12px;border:1px solid rgba(78,168,255,0.4);background:rgba(9,16,35,0.8);color:var(--text);border-radius:8px;width:100%;font-size:14px}
        button{padding:12px 24px;background:var(--accent);color:#000;border:none;border-radius:8px;cursor:pointer;font-weight:600;transition:0.3s;width:100%}
        button:hover{background:#3b82f6;transform:translateY(-2px)}
        .tab-btn{padding:8px 16px;margin:5px;background:rgba(78,168,255,0.1);border:1px solid rgba(78,168,255,0.3);cursor:pointer;border-radius:20px;color:var(--text)}
        .tab-btn.active{background:var(--accent);color:#000}
        .tab-content{display:none}
        .tab-content.active{display:block}
    </style>
</head>
<body>
    <div class="glass-card">
        <h1 style="margin-bottom:24px;text-align:center">Bogorodsk RP - Система жалоб</h1>
        
        <div id="auth-section" style="text-align:center">
            <p style="margin-bottom:20px">Авторизуйтесь через Discord для подачи заявки</p>
            <button onclick="login()">🔗 Войти через Discord</button>
        </div>

        <div id="main-section" style="display:none">
            <div id="user-info" style="margin-bottom:20px;text-align:right;font-size:14px;color:var(--accent)"></div>
            <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;justify-content:center">
                <button class="tab-btn active" onclick="tab(event, 'p-rep')">Жалоба на игрока</button>
                <button class="tab-btn" onclick="tab(event, 'a-rep')">Жалоба на админа</button>
                <button class="tab-btn" onclick="tab(event, 'appeal')">Апелляция</button>
            </div>

            <div id="p-rep" class="tab-content active">
                <form onsubmit="send(event, 'Жалоба на игрока')">
                    <div class="form-group"><label>Ник нарушителя:</label><input type="text" name="Ник" required></div>
                    <div class="form-group"><label>Описание:</label><textarea name="Суть" rows="5" required></textarea></div>
                    <button type="submit">Отправить</button>
                </form>
            </div>

            <div id="a-rep" class="tab-content">
                <form onsubmit="send(event, 'Жалоба на админа')">
                    <div class="form-group"><label>Ник админа:</label><input type="text" name="Админ" required></div>
                    <div class="form-group"><label>Описание:</label><textarea name="Суть" rows="5" required></textarea></div>
                    <button type="submit">Отправить</button>
                </form>
            </div>

            <div id="appeal" class="tab-content">
                <form onsubmit="send(event, 'Апелляция')">
                    <div class="form-group"><label>ID наказания:</label><input type="text" name="ID" required></div>
                    <div class="form-group"><label>Объяснение:</label><textarea name="Суть" rows="5" required></textarea></div>
                    <button type="submit">Отправить</button>
                </form>
            </div>
        </div>
    </div>

    <script>
    // Твои проверенные данные
    const CONFIG = {
        SB_URL: 'https://eyrtcaksbklvvgzdqzby.supabase.co',
        SB_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5cnRjYWtzYmtsdnZnemRxemJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxODYxODIsImV4cCI6MjA4OTc2MjE4Mn0.9upxknDuM5X3GVOsoOqBy8cHX2qHkFMYg2fUDsVNui8',
        WEBHOOK: 'https://discord.com/api/webhooks/1485275103481565196/Qpymf82OnmWFPUhAN8CnvG3ZPduKe3cn3fgJQi5ayP2yjnxUu0xvs-z1LMrnqEzW4x7X',
        REDIRECT: 'https://alekseylevkin88-tech.github.io/bogorodsk-reports/'
    };

    // Инициализация (используем уникальное имя portal, чтобы не было конфликтов)
    const portal = window.supabase.createClient(CONFIG.SB_URL, CONFIG.SB_KEY);

    // 1. Авторизация
    async function discordAuth() {
        const { error } = await portal.auth.signInWithOAuth({
            provider: 'discord',
            options: { redirectTo: CONFIG.REDIRECT }
        });
        if (error) alert("Ошибка входа: " + error.message);
    }

    // 2. Проверка сессии при загрузке
    async function checkUser() {
        const { data: { user } } = await portal.auth.getUser();
        if (user) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-section').style.display = 'block';
            const status = document.getElementById('status');
            status.style.display = 'block';
            status.innerHTML = `Вы вошли как: <b>${user.user_metadata.full_name || user.email}</b>`;
        }
    }
    window.onload = checkUser;

    // 3. Переключение вкладок
    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
    }

    // 4. Отправка отчета
    async function sendReport(formId, title) {
        const form = document.getElementById(formId);
        const { data: { user } } = await portal.auth.getUser();
        
        // Собираем данные по ID полей, как в твоем HTML
        const fields = [];
        form.querySelectorAll('input, textarea').forEach(el => {
            if (el.id && el.value && el.type !== 'file') {
                const label = el.previousElementSibling ? el.previousElementSibling.innerText : el.id;
                fields.push({ name: label, value: el.value, inline: true });
            }
        });

        const body = {
            embeds: [{
                title: `📋 ${title}`,
                color: 5185791,
                fields: [
                    { name: 'Отправитель', value: `<@${user.user_metadata.provider_id}>`, inline: false },
                    ...fields
                ],
                timestamp: new Date().toISOString()
            }]
        };

        const res = await fetch(CONFIG.WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });

        if (res.ok) {
            alert('Успешно отправлено!');
            form.reset();
        } else {
            alert('Ошибка при отправке в Discord');
        }
    }

    // Привязка обработчиков
    document.getElementById('report-player-form').onsubmit = (e) => { e.preventDefault(); sendReport('report-player-form', 'Жалоба на игрока'); };
    document.getElementById('report-admin-form').onsubmit = (e) => { e.preventDefault(); sendReport('report-admin-form', 'Жалоба на админа'); };
    document.getElementById('appeal-form').onsubmit = (e) => { e.preventDefault(); sendReport('appeal-form', 'Апелляция'); };
</script>
</body>
</html>
